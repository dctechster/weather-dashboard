<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%"   stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#fff9c4"/>
      <stop offset="55%"  stop-color="#ffca28"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </radialGradient>
    <filter id="cloudShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="100" height="100" rx="22" fill="url(#sky)"/>

  <!-- Sun ambient glow -->
  <circle cx="37" cy="36" r="24" fill="#ffca28" opacity="0.18"/>

  <!-- Sun rays -->
  <g transform="translate(37,36)" stroke="#ffb300" stroke-width="4.5" stroke-linecap="round" opacity="0.92">
    <line x1="0" y1="-22" x2="0" y2="-30"/>
    <line x1="0" y1="-22" x2="0" y2="-30" transform="rotate(45)"/>
    <line x1="0" y1="-22" x2="0" y2="-30" transform="rotate(90)"/>
    <line x1="0" y1="-22" x2="0" y2="-30" transform="rotate(135)"/>
    <line x1="0" y1="-22" x2="0" y2="-30" transform="rotate(180)"/>
    <line x1="0" y1="-22" x2="0" y2="-30" transform="rotate(225)"/>
    <line x1="0" y1="-22" x2="0" y2="-30" transform="rotate(270)"/>
    <line x1="0" y1="-22" x2="0" y2="-30" transform="rotate(315)"/>
  </g>

  <!-- Sun body -->
  <circle cx="37" cy="36" r="17" fill="url(#sunGrad)"/>

  <!-- Cloud (overlapping lower-right of sun) -->
  <g filter="url(#cloudShadow)">
    <circle cx="43" cy="70" r="13" fill="white"/>
    <circle cx="57" cy="63" r="16" fill="white"/>
    <circle cx="71" cy="70" r="11" fill="white"/>
    <ellipse cx="57" cy="78" rx="27" ry="12" fill="white"/>
  </g>
</svg>
